name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - id: version
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -eu
          node -e 'if (!/^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(process.env.REQUESTED_TAG ?? "")) process.exit(1)' || {
            echo "Invalid tag: $REQUESTED_TAG" >&2
            exit 1
          }
          VERSION="${REQUESTED_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$VERSION" = "$PACKAGE_VERSION" || {
            echo "Tag $REQUESTED_TAG does not match package version $PACKAGE_VERSION" >&2
            exit 1
          }
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              runner: ubuntu-24.04,
              target_id: linux-x64,
              bun_target: bun-linux-x64-baseline,
              archive: tar,
            }
          - {
              runner: ubuntu-24.04-arm,
              target_id: linux-arm64,
              bun_target: bun-linux-arm64,
              archive: tar,
            }
          - {
              runner: macos-15-intel,
              target_id: macos-x64,
              bun_target: bun-darwin-x64,
              archive: tar,
            }
          - {
              runner: macos-15,
              target_id: macos-arm64,
              bun_target: bun-darwin-arm64,
              archive: tar,
            }
          - {
              runner: windows-2025,
              target_id: windows-x64,
              bun_target: bun-windows-x64-baseline,
              archive: zip,
            }
          - {
              runner: windows-11-arm,
              target_id: windows-arm64,
              bun_target: bun-windows-arm64,
              archive: zip,
            }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - name: Build release directory
        run: >-
          bun packages/cli/src/scripts/build-release.ts
          --target-id ${{ matrix.target_id }}
          --bun-target ${{ matrix.bun_target }}
          --version ${{ needs.validate.outputs.version }}
      - name: Smoke test native executables
        shell: pwsh
        run: |
          $name = "octofriend-${{ needs.validate.outputs.version }}-${{ matrix.target_id }}"
          $directory = Join-Path "dist/release" $name
          $extension = if ("${{ matrix.target_id }}".StartsWith("windows-")) { ".exe" } else { "" }
          & (Join-Path $directory "octofriend$extension") --help | Out-Null
          '{"jsonrpc":"2.0","id":1,"method":"initialize"}' |
            & (Join-Path $directory "octofriend-agentd$extension") |
            Select-Object -First 1 | Out-Null
          $config = Join-Path $env:RUNNER_TEMP "octofriend-acp-smoke.json5"
          '{"configVersion":6,"yourName":"CI","models":[{"type":"standard","nickname":"Smoke","baseUrl":"https://example.invalid/v1","model":"smoke","context":1000}]}' |
            Set-Content -Encoding utf8 $config
          $output = '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":1,"clientCapabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' |
            & (Join-Path $directory "octofriend-acp$extension") --config $config
          $response = ($output | Select-Object -First 1) | ConvertFrom-Json
          if ($response.result.agentInfo.version -ne "${{ needs.validate.outputs.version }}") {
            throw "ACP smoke test returned the wrong version"
          }
      - name: Create tar archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -eu
          name="octofriend-${{ needs.validate.outputs.version }}-${{ matrix.target_id }}"
          tar -C dist/release -czf "$name.tar.gz" "$name"
      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "octofriend-${{ needs.validate.outputs.version }}-${{ matrix.target_id }}"
          Compress-Archive -Path "dist/release/$name" -DestinationPath "$name.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target_id }}
          path: octofriend-${{ needs.validate.outputs.version }}-${{ matrix.target_id }}.*
          if-no-files-found: error
          compression-level: 0

  chocolatey:
    needs: [validate, build]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-windows-*
          path: chocolatey/tools
          merge-multiple: true
      - name: Pack embedded Chocolatey package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          choco pack chocolatey/octofriend.nuspec --version "${{ needs.validate.outputs.version }}" --outputdirectory release-assets
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-chocolatey
          path: release-assets/octofriend.${{ needs.validate.outputs.version }}.nupkg
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: [validate, build, chocolatey]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Add standalone installers
        run: cp install.sh install.ps1 release-assets/
      - name: Generate checksums
        working-directory: release-assets
        run: |
          checksums=$(mktemp)
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' |
            sort -z |
            xargs -0 sha256sum > "$checksums"
          mv "$checksums" SHA256SUMS
      - uses: actions/attest@v4.1.1
        with:
          subject-path: release-assets/*
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
            gh release edit "$TAG" --title "$TAG"
          else
            gh release create "$TAG" release-assets/* --verify-tag --generate-notes --title "$TAG"
          fi

  update-distribution:
    needs: [validate, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - name: Download published checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: gh release download "$TAG" --dir distribution-assets --pattern SHA256SUMS
      - name: Generate Homebrew formula and Scoop manifest
        run: >-
          bun scripts/update-distribution.ts
          --version ${{ needs.validate.outputs.version }}
          --assets distribution-assets
          --output .
      - name: Validate generated metadata
        run: |
          ruby -c Formula/octofriend.rb
          jq --exit-status . bucket/octofriend.json >/dev/null
      - name: Commit hosted package metadata
        env:
          BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/octofriend.rb bucket/octofriend.json
          if git diff --cached --quiet; then
            echo "Distribution metadata is already current."
            exit 0
          fi
          git commit -m "chore(release): update package metadata for $VERSION"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
